  #     - run: npm ci
  #     - run: npx napi build --platform
  #     - name: Launch headless Chrome
  #       run: |
  #         "${{ steps.chrome.outputs.chrome-path }}" \
  #           --headless=new --remote-debugging-port=9222 \
  #           --no-first-run --no-sandbox --disable-gpu about:blank \
  #           > /tmp/chrome.log 2>&1 &
  #         for i in $(seq 1 30); do
  #           curl -sf http://127.0.0.1:9222/json/version > /dev/null && exit 0
  #           sleep 1
  #         done
  #         echo "Chrome debug port never came up" >&2
  #         cat /tmp/chrome.log >&2
  #         exit 1
  #     - name: Smoke test
  #       run: node test.mjs

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: macos-latest
            target: aarch64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.host }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross linker (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - run: npm ci
      - run: npx napi build --platform --release --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: crates/cdp-protocol-node/*.node

  publish:
    name: publish to npm
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/node-v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          path: crates/cdp-protocol-node/artifacts
      - name: Move prebuilds into per-platform npm dirs
        run: npx napi artifacts --dir artifacts
      - run: npx napi prepublish -t npm --skip-gh-release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
