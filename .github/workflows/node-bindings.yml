name: node-bindings

on:
  push:
    branches: [main]
    paths: ['crates/**', 'Cargo.toml', '.github/workflows/node-bindings.yml']
    tags: ['node-v*']
  pull_request:
    paths: ['crates/**', 'Cargo.toml']

defaults:
  run:
    working-directory: crates/cdp-protocol-node

jobs:
  # Disabled: smoke/load testing is run locally against a real Chrome.
  # Re-enable and add `test` back to the publish `needs:` list to gate on CI.
